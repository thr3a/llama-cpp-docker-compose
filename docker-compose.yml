x-common-settings: &common-settings
  volumes:
    - ./cache:/root/.cache
  environment:
    TZ: Asia/Tokyo
  tty: true
  stop_grace_period: 0s
  ipc: host
  env_file:
    - .env

services:
  main:
    <<: *common-settings
    image: vulkan-amdvlk:1.0
    # image: rocm-7.1.1:1.0
    ports:
      - "8000:8000"
    devices:
      - "/dev/dri:/dev/dri"
    privileged: true
    command: >
      /usr/bin/llama-server
      --host 0.0.0.0
      --port 8000
      -hf unsloth/Qwen3-4B-Instruct-2507-GGUF:Q4_0
      -ngl 99 --ctx-size 32768 -a gpt-4o-mini --no-mmap --flash-attn on
      --jinja -ctk q8_0 -ctv q8_0 --batch-size 4096
  # -ctk q8_0 -ctv q8_0 
  # download:
  #   <<: *common-settings
  #   image: vulkan-amdvlk:1.0
  #   command: >
  #     /usr/bin/llama-server
  #     --host 0.0.0.0
  #     --port 8000
  #     -hf unsloth/Qwen3-235B-A22B-Instruct-2507-GGUF:UD-Q3_K_XL
  #     -ngl 1 --ctx-size 2000 -a gpt-4o-mini --no-mmap --jinja
  benchmark:
    <<: *common-settings
    image: vulkan-amdvlk:1.0
    devices:
      - "/dev/dri:/dev/dri"
    privileged: true
    command: >
      /usr/bin/llama-bench
      -m /root/.cache/llama.cpp/unsloth_Qwen3-4B-Instruct-2507-GGUF_Qwen3-4B-Instruct-2507-Q4_0.gguf
      -d 32768
      -p 2048
      -n 128
      --repetitions 1
      -mmp 0 --flash-attn 1 -ngl 99 --threads 16
      --cache-type-k q8_0,f16 --cache-type-v q8_0

# --batch-size 256,512,1024,2048,4096

