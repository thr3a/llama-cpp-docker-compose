  #     -a gpt-4o-mini
  #     --jinja --temp 0.7 --min-p 0.0 --top-p 0.80 --top-k 20 --presence-penalty 1.0 

  cpu:
    <<: *common-settings
    image: ghcr.io/ggml-org/llama.cpp:server
    ports:
      - "8002:8000"
    command: >
      --host 0.0.0.0
      --port 8000
      --hf-repo unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF
      --hf-file Qwen3-30B-A3B-Instruct-2507-Q8_0.gguf
      --threads 8
      --ctx-size 4096
      -a gpt-4o-mini

