x-common-settings: &common-settings
  volumes:
    - ./cache:/root/.cache
  environment:
    TZ: Asia/Tokyo
  tty: true
  stop_grace_period: 0s
  ipc: host
  env_file:
    - .env

services:
  main:
    <<: *common-settings
    image: vulkan-amdvlk:1.0
    ports:
      - "8000:8000"
    devices:
      - "/dev/dri:/dev/dri"
    privileged: true
    command: >
      /usr/bin/llama-server
      --host 0.0.0.0
      --port 8000
      -hf unsloth/Qwen3-Next-80B-A3B-Instruct-GGUF:Q8_0
      -ngl 99 --ctx-size 262144 -a gpt-4o-mini --no-mmap --flash-attn on
      --temp 0 --min-p 0.0 --top-p 0.80 --top-k 20 --presence-penalty 1.0 --jinja
      --verbose
