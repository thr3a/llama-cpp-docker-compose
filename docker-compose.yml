x-common-settings: &common-settings
  volumes:
    - ./cache:/root/.cache
  environment:
    TZ: Asia/Tokyo
  tty: true
  stop_grace_period: 0s
  ipc: host
  env_file:
    - .env

services:
  proxy:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - 4000:4000
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
      - ./message_truncation_callback.py:/app/message_truncation_callback.py
    command: --config /app/config.yaml
    restart: always
  main:
    <<: *common-settings
    image: vulkan-amdvlk:1.0
    # image: rocm-7.1.1:1.0
    ports:
      - "8000:8000"
    devices:
      - "/dev/dri:/dev/dri"
    privileged: true
    command: >
      /usr/bin/llama-server
      --host 0.0.0.0
      --port 8000
      -hf unsloth/Qwen3-235B-A22B-Instruct-2507-GGUF:UD-Q3_K_XL
      -ngl 99 --ctx-size 32768 -a gpt-4o-mini --flash-attn on --threads 16 --batch-size 2048 --ubatch-size 1024 --no-mmap
      --jinja
      --cache-reuse 512 --cache-ram -1 --cache-type-k q8_0 --cache-type-v q8_0

  sub:
    <<: *common-settings
    image: vulkan-amdvlk:1.0
    ports:
      - "8001:8000"
    devices:
      - "/dev/dri:/dev/dri"
    privileged: true
    command: >
      /usr/bin/llama-server
      --host 0.0.0.0
      --port 8000
      -hf unsloth/Qwen3-4B-Instruct-2507-GGUF:Q8_0
      -ngl 99 --ctx-size 32768 -a gpt-4o-mini --flash-attn on --threads 16
      --temp 0.6 --min-p 0.0 --top-p 0.95 --top-k 20 --presence-penalty 1.0
      --jinja

