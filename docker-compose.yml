x-common-settings: &common-settings
  image: ghcr.io/ggml-org/llama.cpp:server-cuda
  volumes:
    - ./cache:/root/.cache
  environment:
    TZ: Asia/Tokyo
  tty: true
  stop_grace_period: 0s
  ipc: host
  env_file:
    - .env

services:
  proxy:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - 4000:4000
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: --config /app/config.yaml
    restart: always
  main:
    <<: *common-settings
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              # device_ids: ['0', '1']
              capabilities: [ gpu ]
      # --hf-repo unsloth/Mistral-Small-3.2-24B-Instruct-2506-GGUF
      # --hf-file Mistral-Small-3.2-24B-Instruct-2506-Q4_K_M.gguf
      # --hf-repo google/gemma-3-27b-it-qat-q4_0-gguf
    command: >
      --host 0.0.0.0
      --port 8000
      --hf-repo unsloth/Mistral-Small-3.2-24B-Instruct-2506-GGUF
      --hf-file Mistral-Small-3.2-24B-Instruct-2506-Q4_K_M.gguf
      --threads 8
      --n-gpu-layers 99
      --ctx-size 20000
      -a gpt-4o-mini
      --n-predict 1024
      --top-p 1
      --min-p 0.05
      --repeat-last-n 0
      --dry-multiplier 0.8
      --dry-allowed-length 4
      --dry-penalty-last-n 0
      --dry-sequence-breaker "\n : \" * <s> </s> [SYSTEM_PROMPT] [/SYSTEM_PROMPT] [INST] [/INST]"
      --dynatemp-exp 5.77
      --samplers "dry;top_k;tfs;typical;top_p;min_p;xtc;temperature"

